<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Selecionar Link</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container-main {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 1rem;
        }

    </style>

</head>

<body>

    <div class="container container-main">

        <div class="card bg-light text-dark">

            <h2 class="text-center mb-4">

                Selecionar Link

            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Escolha um link

                    </label>

                    <select
                        name="link_id"
                        class="form-select"
                    >

                        {% for link in links %}

                        <option value="{{ link.id }}">

                            {{ link.titulo }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn btn-warning w-100 text-white"
                >

                    Editar

                </button>

            </form>

        </div>

    </div>

</body>

</html>
